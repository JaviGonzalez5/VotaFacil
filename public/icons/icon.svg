<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#6366f1"/>
  <!-- Ballot box icon -->
  <rect x="120" y="160" width="272" height="220" rx="16" fill="white" opacity="0.15"/>
  <rect x="120" y="160" width="272" height="220" rx="16" fill="none" stroke="white" stroke-width="16"/>
  <!-- Slot on top -->
  <rect x="216" y="120" width="80" height="60" rx="8" fill="none" stroke="white" stroke-width="14"/>
  <!-- Check marks inside -->
  <line x1="170" y1="255" x2="195" y2="280" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <line x1="195" y1="280" x2="240" y2="230" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <!-- Dots for other options -->
  <circle cx="296" cy="255" r="10" fill="white" opacity="0.7"/>
  <circle cx="340" cy="255" r="10" fill="white" opacity="0.4"/>
  <!-- Lines under -->
  <line x1="160" y1="310" x2="352" y2="310" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
  <line x1="160" y1="340" x2="280" y2="340" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.3"/>
</svg>
